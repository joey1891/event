<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이벤트 참여 신청</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS 라이브러리 임포트 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .form-input {
            @apply mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-base p-3 border;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8">
        <!-- 헤더 섹션 -->
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">🎁 이벤트 신청하기</h1>
            <p class="text-gray-500 mt-2">모든 항목을 입력하여 신청을 완료해주세요.</p>
        </div>

        <!-- 설문 폼 -->
        <form id="surveyForm" class="space-y-5">
            <!-- 사용자 성함 (user_name, 필수) -->
            <div>
                <label class="block text-sm font-semibold text-gray-700">이름 <span class="text-red-500">*</span></label>
                <input type="text" id="user_name" required placeholder="이름을 입력하세요" class="form-input">
            </div>

            <!-- 이메일 (email, 필수) -->
            <div>
                <label class="block text-sm font-semibold text-gray-700">이메일 <span class="text-red-500">*</span></label>
                <input type="email" id="email" required placeholder="example@email.com" class="form-input">
            </div>

            <!-- 연락처 (Phone, 필수) -->
            <div>
                <label class="block text-sm font-semibold text-gray-700">연락처 <span class="text-red-500">*</span></label>
                <input type="tel" id="Phone" required placeholder="010-0000-0000" class="form-input">
            </div>

            <!-- 주소 (address, 필수) -->
            <div>
                <label class="block text-sm font-semibold text-gray-700">주소 <span class="text-red-500">*</span></label>
                <input type="text" id="address" required placeholder="상세 주소를 입력하세요" class="form-input">
            </div>

            <!-- 개인정보 동의 (privacy_agree, 필수) -->
            <div class="bg-gray-50 p-4 rounded-lg border border-gray-100">
                <div class="flex items-start">
                    <div class="flex items-center h-5">
                        <input id="privacy_agree" type="checkbox" required class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded">
                    </div>
                    <div class="ml-3 text-sm">
                        <label for="privacy_agree" class="font-medium text-gray-700">개인정보 수집 및 이용 동의 <span class="text-red-500">*</span></label>
                        <p class="text-gray-500 text-xs mt-1">이벤트 진행 및 경품 발송을 위해 정보를 수집합니다.</p>
                    </div>
                </div>
            </div>

            <!-- 제출 버튼 -->
            <button type="submit" id="submitBtn" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-lg hover:bg-indigo-700 transition duration-200 shadow-lg shadow-indigo-200">
                신청 완료하기
            </button>
        </form>

        <!-- 결과 메시지 박스 -->
        <div id="statusMessage" class="hidden mt-6 p-4 rounded-lg text-center font-medium"></div>
    </div>

    <script>
        // Supabase 설정
        const SUPABASE_URL = 'https://rayhgqcpupwmwpymtkwg.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_uxs3i3d0RtIPeB_hyb0Bfw_knaezHRO'; 
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const surveyForm = document.getElementById('surveyForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusMessage = document.getElementById('statusMessage');

        function showMessage(text, isSuccess) {
            statusMessage.innerText = text;
            statusMessage.classList.remove('hidden', 'bg-green-100', 'text-green-700', 'bg-red-100', 'text-red-700');
            if (isSuccess) statusMessage.classList.add('bg-green-100', 'text-green-700');
            else statusMessage.classList.add('bg-red-100', 'text-red-700');
        }

        surveyForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            submitBtn.disabled = true;
            submitBtn.innerText = '전송 중...';

            // 이미지의 컬럼명과 정확히 일치하도록 Key값을 매칭했습니다.
            const formData = {
                user_name: document.getElementById('user_name').value,
                email: document.getElementById('email').value,
                Phone: document.getElementById('Phone').value,
                address: document.getElementById('address').value,
                privacy_agree: document.getElementById('privacy_agree').checked
            };

            try {
                const { error } = await supabaseClient
                    .from('survey_responses') 
                    .insert([formData]);

                if (error) throw error;

                showMessage('🎉 성공적으로 신청되었습니다!', true);
                surveyForm.reset(); 
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('❌ 오류가 발생했습니다: ' + error.message, false);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = '신청 완료하기';
            }
        });
    </script>
</body>
</html>
